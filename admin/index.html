<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ozichat · Admin Console</title>
    <meta name="theme-color" content="#0B0E14" />
    <meta name="description" content="Ozichat Admin Console — manage users, chats, reels and live map." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      html, body, #admin-root { height: 100%; }
      body {
        margin: 0;
        background: #0B0E14;
        color: #fff;
        font-family: 'Poppins', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* Sleek dark scrollbars for the admin console */
      *::-webkit-scrollbar { width: 10px; height: 10px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.08);
        border-radius: 8px;
      }
      *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
      ::selection { background: rgba(63,155,255,0.35); }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
        }
      }
    </script>
  </head>
  <body>
    <noscript>JavaScript is required to use the Ozichat Admin Console.</noscript>
    <div id="admin-root"></div>
    <script type="module" src="/admin-web/main.tsx"></script>
  </body>
</html>
